# Per-archetype per-100-team-possessions rate baselines for `stat_projection_model`.
#
# Convention: each rate is the player's expected statistic per 100 *team*
# possessions while on the floor, at the archetype's typical usage. The
# engine scales by `(team_pace × minutes/48) / 100` to convert to per-game
# means and by `(usage_share / default_usage)^0.8` for usage-driven stats
# (PTS, AST, TOV, 3PA, FTA). REB / STL / BLK are floor-time driven, not
# usage-scaled.
#
# Star uplift (in `StatProjectionWeights::star_uplift_*`) is added to the
# per-100 baseline for franchise-tagged players. Plus a primary-creator
# rebound + assist bonus tied to high usage so triple-doubles emerge from
# the players who actually create them (not random rolls).
#
# Real-world calibration anchors (NBA 2024-25 starter band, per 100 poss):
#   PTS:  18-38   primary creators 28-38, role wings 12-18
#   REB:  4-15    bigs 11-15, wings 5-8, guards 3-6
#   AST:  3-13    primary creators 9-13, off-ball wings 2-4
#   TOV:  2-4
#   3PA:  1-10    shooters 8-10, slashers 4-6, bigs 0-3
#   FTA:  3-9     slashers 7-9, shooters 2-4


# nba3k-claude — 30 NBA GM personalities, 2025-26 season.
#
# Each entry is keyed by team abbreviation (matches `Team.abbrev` in
# nba3k-core::team). `archetype` is one of the 11 variants in
# `nba3k_core::GMArchetype`; defaults are seeded by
# `GMPersonality::from_archetype()` and an optional `[ABBREV.traits]` table
# overrides individual `GMTraits` fields.
#
# Sourcing approach: archetypes lean on widely-reported tendencies from the
# 2024-25 / 2025-26 cycle (deal-history, public statements, ownership posture).
# When in doubt we picked `Conservative` — a defensible neutral — rather than
# inventing a controversial read. Trait overrides are reserved for tendencies
# the public record clearly supports (e.g. Presti's patience, Pelinka's
# star-hunting, ownership-driven cheapness in Charlotte / Washington).
#
# References:
#   - GM identity / tenure: each franchise's 2025-26 front-office page.
#   - Behavioral reads: HoopsRumors transaction logs, The Athletic / ESPN
#     reporting on each FO's last 24 months of moves.
#
# Don't read these as predictions — they're priors to seed the trade engine.
# Calibration via `dev calibrate-trade` will surface anything wildly off.

[ATL]
archetype = "Conservative"
gm_name = "Onsi Saleh"
# Saleh took over from Landry Fields summer 2025; early reads suggest a
# pragmatic, value-conscious operator threading the apron needle around
# Trae Young.
[ATL.traits]
patience = 0.5
salary_aversion = 1.2

[BOS]
archetype = "WinNow"
gm_name = "Brad Stevens"
# Active 2024 champion roster; Stevens has shown he'll pay luxury tax for a
# title window but is disciplined about long-term flexibility.
[BOS.traits]
patience = 0.3
star_premium = 1.4
risk_tolerance = 0.55

[BRK]
archetype = "Rebuilder"
gm_name = "Sean Marks"
# Post-Mikal/KD pivot is unambiguous: hoarding picks, embracing youth
# development. Patience override matches the timeline reset.
[BRK.traits]
patience = 0.95
pick_value_multiplier = 1.6

[CHO]
archetype = "Cheapskate"
gm_name = "Jeff Peterson"
# Long-running ownership preference for staying off the tax line; FO tends
# to prioritize cap sheet over marginal wins.
[CHO.traits]
tax_aversion = 2.2
salary_aversion = 1.6

[CHI]
archetype = "Conservative"
gm_name = "Arturas Karnisovas"
# Famously slow to commit either direction (retool vs rebuild). Conservative
# fits the holding pattern; small risk-tolerance bump is generous.

[CLE]
archetype = "WinNow"
gm_name = "Koby Altman"
# Apron-2 territory built around Mitchell/Garland/Mobley/Allen core; window
# is now.
[CLE.traits]
patience = 0.25
current_overall_weight = 1.55

[DAL]
archetype = "StarHunter"
gm_name = "Nico Harrison"
# Track record of swinging for stars (Doncic-era acquisitions, AD trade).
# Star-hunting bias is the cleanest read.
[DAL.traits]
star_premium = 1.7
risk_tolerance = 0.7

[DEN]
archetype = "WinNow"
gm_name = "Ben Tenzer"
# Around a Jokic prime — not maximal aggression but clearly title-window.
[DEN.traits]
patience = 0.3
star_premium = 1.5

[DET]
archetype = "Rebuilder"
gm_name = "Trajan Langdon"
# Langdon hired 2024 to lead a from-scratch rebuild around Cunningham;

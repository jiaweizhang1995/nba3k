[GSW.traits]
patience = 0.2
pick_value_multiplier = 0.65
current_overall_weight = 1.5

[HOU]
archetype = "Analytics"
gm_name = "Rafael Stone"
# Transitioning from full rebuild to win-soon (added VanVleet, Brooks,
# Durant) but still values picks. Retool fits the dual mandate.
[HOU.traits]
